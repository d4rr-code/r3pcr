<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>R3-PCR | Verify OTP</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #0f172a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .card {
            background: #1e293b;
            padding: 40px;
            border-radius: 12px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.3);
            text-align: center;
        }
        .logo h1 {
            color: #3b82f6;
            font-size: 28px;
            font-weight: 700;
        }
        .logo p {
            color: #94a3b8;
            font-size: 13px;
            margin-top: 4px;
            margin-bottom: 30px;
        }
        .icon {
            font-size: 48px;
            margin-bottom: 16px;
        }
        h2 {
            color: #f1f5f9;
            font-size: 20px;
            margin-bottom: 8px;
        }
        .subtitle {
            color: #94a3b8;
            font-size: 13px;
            margin-bottom: 24px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        input {
            width: 100%;
            padding: 12px;
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 8px;
            color: #f1f5f9;
            font-size: 20px;
            text-align: center;
            letter-spacing: 8px;
            outline: none;
        }
        input:focus { border-color: #3b82f6; }
        button {
            width: 100%;
            padding: 12px;
            background: #3b82f6;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
        }
        button:hover { background: #2563eb; }
        .back-link {
            display: block;
            margin-top: 16px;
            color: #94a3b8;
            font-size: 13px;
            text-decoration: none;
        }
        .back-link:hover { color: #3b82f6; }
        .messages { margin-bottom: 16px; }
        .message {
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 13px;
            margin-bottom: 8px;
        }
        .message.error {
            background: #450a0a;
            color: #fca5a5;
            border: 1px solid #991b1b;
        }
        .message.success {
            background: #052e16;
            color: #86efac;
            border: 1px solid #166534;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">
            <h1>R3-PCR</h1>
            <p>Pre-Clearance Decision Support System</p>
        </div>

        <div class="icon">📧</div>
        <h2>Check your email</h2>
        <p class="subtitle">We sent a 6-digit OTP to your email address. It expires in 10 minutes.</p>

        {% if messages %}
        <div class="messages">
            {% for message in messages %}
            <div class="message {{ message.tags }}">
                {{ message }}
            </div>
            {% endfor %}
        </div>
        {% endif %}

        <form method="POST">
            {% csrf_token %}
            <div class="form-group">
                <input
                    type="text"
                    name="otp_code"
                    placeholder="000000"
                    maxlength="6"
                    required
                    autofocus
                >
            </div>
            <button type="submit">Verify OTP</button>
        </form>

        <a href="{% url 'accounts:login' %}" class="back-link">
            ← Back to Login
        </a>
    </div>
</body>
</html>
