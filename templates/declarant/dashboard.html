{% extends 'base.html' %}

{% block title %}Declarant Dashboard{% endblock %}
{% block page_title %}Declarant Dashboard{% endblock %}

{% block content %}
<div class="kpi-grid">
    <div class="kpi-card blue">
        <p class="kpi-label">Queue</p>
        <p class="kpi-value">0</p>
    </div>
    <div class="kpi-card yellow">
        <p class="kpi-label">In Progress</p>
        <p class="kpi-value">0</p>
    </div>
    <div class="kpi-card green">
        <p class="kpi-label">Completed Today</p>
        <p class="kpi-value">0</p>
    </div>
    <div class="kpi-card red">
        <p class="kpi-label">Rejected</p>
        <p class="kpi-value">0</p>
    </div>
</div>

<div class="card">
    <p class="card-title">Pending Queue</p>
    <p style="color: #94a3b8; font-size: 14px;">No pending shipments.</p>
</div>
{% endblock %}
